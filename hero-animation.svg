<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="240">
  <style>
    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOn { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    
    .bg { fill: #0d1117; stroke: #30363d; stroke-width: 2; }
    .header-bg { fill: #161b22; }
    .header-title { font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; fill: #8b949e; font-weight: 500;}
    
    .text-main { font-family: 'Fira Code', 'Consolas', 'Courier New', monospace; font-size: 15px; font-weight: 500; fill: #00ff41; }
    
    /* Syntax Highlighting */
    .prompt-user { fill: #ffb86c; font-weight: bold; }
    .prompt-at { fill: #6272a4; }
    .prompt-host { fill: #8be9fd; font-weight: bold; }
    .prompt-dir { fill: #f1fa8c; font-weight: bold; }
    
    .cmd { fill: #f8f8f2; }
    .sys-log { fill: #50fa7b; font-style: italic; opacity: 0.9; }
    
    /* The Name */
    .name-text { font-family: 'Poppins', 'Segoe UI', -apple-system, sans-serif; font-size: 42px; font-weight: 800; fill: #ffffff; letter-spacing: 2px; }
    
    .role-text { fill: #bd93f9; font-weight: bold; }
    
    /* Animations per line */
    .line { opacity: 0; }
    .l1 { animation: fadeIn 0.3s cubic-bezier(0.19, 1, 0.22, 1) forwards 0.5s; }
    .l2 { animation: fadeIn 0.3s cubic-bezier(0.19, 1, 0.22, 1) forwards 1.2s; }
    .l3 { animation: fadeIn 0.3s cubic-bezier(0.19, 1, 0.22, 1) forwards 2.0s; }
    .name-anim { opacity: 0; animation: fadeOn 0.1s forwards 2.0s; }
    .l4 { animation: fadeIn 0.3s cubic-bezier(0.19, 1, 0.22, 1) forwards 3.0s; }
    .l5 { animation: fadeIn 0.3s cubic-bezier(0.19, 1, 0.22, 1) forwards 3.8s; }
    
    /* Cursors */
    .c-active { opacity: 0; fill: #f8f8f2; animation: blink 1s step-end infinite 4.1s; }
    
  </style>

  <!-- Window Container -->
  <rect class="bg" width="100%" height="100%" rx="8" />
  <rect class="header-bg" width="100%" height="32" rx="8" />
  
  <!-- Window Controls -->
  <circle cx="20" cy="16" r="6" fill="#ff5f56" />
  <circle cx="40" cy="16" r="6" fill="#ffbd2e" />
  <circle cx="60" cy="16" r="6" fill="#27c93f" />

  <!-- Header Title -->
  <text x="400" y="21" class="header-title" text-anchor="middle">user@niraj-mainframe: ~</text>

  <!-- Terminal Content -->
  <g transform="translate(25, 65)">
    <!-- Line 1 -->
    <g class="line l1 text-main">
      <text x="0" y="0">
        <tspan class="prompt-user">user</tspan><tspan class="prompt-at">@</tspan><tspan class="prompt-host">mainframe</tspan><tspan class="prompt-at">:</tspan><tspan class="prompt-dir">~</tspan><tspan class="cmd">$ </tspan>./init.sh --verbose
      </text>
    </g>
    
    <!-- Line 2 -->
    <g class="line l2 text-main">
      <text x="0" y="28" class="sys-log">[SUCCESS] Handshake verified. Boot sequence initiated...</text>
    </g>

    <g class="line l3 text-main">
      <text x="0" y="56" class="sys-log">[OK] Access granted. Executing whoami...</text>
    </g>
    
    <!-- Big Name Title -->
    <g class="name-anim">
      <text x="0" y="105" class="name-text">Niraj Kushwaha</text>
    </g>

    <!-- Line 3 -> assign ROLE -->
    <g class="line l4 text-main">
      <text x="0" y="145">
        <tspan class="prompt-user">user</tspan><tspan class="prompt-at">@</tspan><tspan class="prompt-host">mainframe</tspan><tspan class="prompt-at">:</tspan><tspan class="prompt-dir">~</tspan><tspan class="cmd">$ </tspan>export ROLE="<tspan class="role-text">Full Stack Developer // UI Designer</tspan>"
      </text>
    </g>

    <!-- Line 4 -> Final prompt waiting for input -->
    <g class="line l5 text-main">
      <text x="0" y="173">
        <tspan class="prompt-user">user</tspan><tspan class="prompt-at">@</tspan><tspan class="prompt-host">mainframe</tspan><tspan class="prompt-at">:</tspan><tspan class="prompt-dir">~</tspan><tspan class="cmd">$</tspan>
      </text>
      <!-- Blinking block cursor -->
      <rect x="235" y="160" width="9" height="15" class="c-active" />
    </g>
  </g>
</svg>
