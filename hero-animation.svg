<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 310" width="100%" height="310">
  <style>
    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOn { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    
    .bg { fill: #1c1e26; stroke: #4f5b66; stroke-width: 1; }
    .header-bg { fill: #2b303b; }
    .header-title { font-family: 'Ubuntu', 'Consolas', monospace; font-size: 14px; fill: #c0c5ce; font-weight: 600;}
    
    .text-main { font-family: 'Ubuntu Mono', 'Fira Code', 'Consolas', monospace; font-size: 16px; font-weight: 500; fill: #a3be8c; }
    
    /* Syntax Highlighting */
    .prompt-user { fill: #ebcb8b; font-weight: bold; }
    .prompt-at { fill: #d08770; }
    .prompt-host { fill: #b48ead; font-weight: bold; }
    .prompt-dir { fill: #88c0d0; font-weight: bold; }
    
    .cmd { fill: #eff1f5; }
    .sys-log { fill: #96b5b4; font-style: italic; opacity: 0.8; }
    
    /* The Name */
    .name-text { font-family: 'Poppins', 'Segoe UI', sans-serif; font-size: 46px; font-weight: 800; fill: #ffffff; letter-spacing: 2px; }
    
    .role-text { fill: #bf616a; font-weight: bold; }
    
    /* Animations per line */
    .line { opacity: 0; }
    .l1 { animation: fadeIn 0.3s cubic-bezier(0.19, 1, 0.22, 1) forwards 0.5s; }
    .l2 { animation: fadeIn 0.3s cubic-bezier(0.19, 1, 0.22, 1) forwards 1.2s; }
    .l3 { animation: fadeIn 0.3s cubic-bezier(0.19, 1, 0.22, 1) forwards 2.0s; }
    .name-anim { opacity: 0; animation: fadeOn 0.1s forwards 2.0s; }
    .l4 { animation: fadeIn 0.3s cubic-bezier(0.19, 1, 0.22, 1) forwards 3.0s; }
    .l5 { animation: fadeIn 0.3s cubic-bezier(0.19, 1, 0.22, 1) forwards 3.8s; }
    
    /* Cursors */
    .c-active { opacity: 0; fill: #eff1f5; animation: blink 1s step-end infinite 4.1s; }
    
  </style>

  <!-- Window Container -->
  <rect class="bg" width="100%" height="100%" rx="4" />
  
  <!-- Linux Header -->
  <rect class="header-bg" width="100%" height="34" />
  <line x1="0" y1="34" x2="800" y2="34" stroke="#4f5b66" stroke-width="1"/>
  
  <!-- Linux Window Controls (Gnome/KDE style - Right Aligned) -->
  <!-- Minimize / Underscore -->
  <rect x="720" y="16" width="12" height="2" fill="#c0c5ce" />
  
  <!-- Maximize / Square -->
  <rect x="745" y="10" width="12" height="12" fill="none" stroke="#c0c5ce" stroke-width="2" />
  
  <!-- Close / X -->
  <path d="M 772 10 L 784 22 M 784 10 L 772 22" stroke="#bf616a" stroke-width="2" stroke-linecap="round" />

  <!-- Header Title Left Aligned -->
  <g transform="translate(15, 22)">
    <path d="M 0 0 L 8 8 L 0 16" fill="none" stroke="#a3be8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, -11) scale(0.6)" />
    <text x="18" y="0" class="header-title">niraj@linux-node: ~</text>
  </g>

  <!-- Terminal Content -->
  <g transform="translate(20, 70)">
    <!-- Line 1 -->
    <g class="line l1 text-main">
      <text x="0" y="0">
        <tspan class="prompt-user">niraj</tspan><tspan class="prompt-at">@</tspan><tspan class="prompt-host">linux-node</tspan><tspan class="prompt-at">:</tspan><tspan class="prompt-dir">~</tspan><tspan class="cmd">$ </tspan>./init.sh --verbose
      </text>
    </g>
    
    <!-- Line 2 -->
    <g class="line l2 text-main">
      <text x="0" y="32" class="sys-log">[SUCCESS] Handshake verified. Boot sequence initiated...</text>
    </g>

    <g class="line l3 text-main">
      <text x="0" y="64" class="sys-log">[OK] Access granted. Executing whoami...</text>
    </g>
    
    <!-- Big Name Title -->
    <g class="name-anim">
      <text x="0" y="120" class="name-text">Niraj Kushwaha</text>
    </g>

    <!-- Line 3 -> assign ROLE -->
    <g class="line l4 text-main">
      <text x="0" y="165">
        <tspan class="prompt-user">niraj</tspan><tspan class="prompt-at">@</tspan><tspan class="prompt-host">linux-node</tspan><tspan class="prompt-at">:</tspan><tspan class="prompt-dir">~</tspan><tspan class="cmd">$ </tspan>export ROLE="<tspan class="role-text">Full Stack Developer</tspan>"
      </text>
    </g>

    <!-- Line 4 -> Final prompt waiting for input -->
    <g class="line l5 text-main">
      <text x="0" y="197">
        <tspan class="prompt-user">niraj</tspan><tspan class="prompt-at">@</tspan><tspan class="prompt-host">linux-node</tspan><tspan class="prompt-at">:</tspan><tspan class="prompt-dir">~</tspan><tspan class="cmd">$</tspan>
      </text>
      <!-- Blinking block cursor -->
      <rect x="250" y="184" width="10" height="18" class="c-active" />
    </g>
  </g>
</svg>
